openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Survey App API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: User authentication
  - name: users
    description: User operations
  - name: surveys
    description: Survey operations
  - name: responses
    description: Survey response operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request or phone already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile and points balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/completions:
    get:
      operationId: getUserCompletions
      tags: [users]
      summary: Get surveys completed by a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of completed survey IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer

  /users/{id}/activate:
    post:
      operationId: activateUser
      tags: [users]
      summary: Activate account via M-Pesa payment verification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateBody"
      responses:
        "200":
          description: Account activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateResponse"
        "400":
          description: Already activated or invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/vip:
    post:
      operationId: upgradeToVip
      tags: [users]
      summary: Upgrade account to VIP via M-Pesa payment verification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VipUpgradeBody"
      responses:
        "200":
          description: VIP upgrade successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VipUpgradeResponse"
        "400":
          description: Already VIP or invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/withdraw:
    post:
      operationId: withdrawPoints
      tags: [users]
      summary: Withdraw points via M-Pesa (simulated)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Withdrawal processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalResponse"
        "400":
          description: Not enough points or invalid user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /surveys:
    get:
      operationId: listSurveys
      tags: [surveys]
      summary: List all surveys
      responses:
        "200":
          description: List of surveys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Survey"
    post:
      operationId: createSurvey
      tags: [surveys]
      summary: Create a new survey (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSurveyBody"
      responses:
        "201":
          description: Created survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /surveys/{id}:
    get:
      operationId: getSurvey
      tags: [surveys]
      summary: Get a survey by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Survey details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSurvey
      tags: [surveys]
      summary: Update a survey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSurveyBody"
      responses:
        "200":
          description: Updated survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSurvey
      tags: [surveys]
      summary: Delete a survey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /surveys/{id}/complete:
    post:
      operationId: completeSurvey
      tags: [surveys]
      summary: Mark a survey as completed and award points to the user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteSurveyBody"
      responses:
        "200":
          description: Points awarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteSurveyResponse"
        "400":
          description: Already completed or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /surveys/{id}/questions:
    get:
      operationId: listSurveyQuestions
      tags: [surveys]
      summary: List questions for a survey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"

  /surveys/{id}/responses:
    get:
      operationId: listSurveyResponses
      tags: [responses]
      summary: List all responses for a survey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of responses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SurveyResponse"
    post:
      operationId: submitSurveyResponse
      tags: [responses]
      summary: Submit a response for a survey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitResponseBody"
      responses:
        "201":
          description: Submitted response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /surveys/{id}/summary:
    get:
      operationId: getSurveySummary
      tags: [surveys]
      summary: Get aggregated summary for a survey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Survey summary with answer breakdowns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveySummary"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /questions:
    post:
      operationId: createQuestion
      tags: [surveys]
      summary: Create a new question for a survey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "201":
          description: Created question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /questions/{id}:
    patch:
      operationId: updateQuestion
      tags: [surveys]
      summary: Update a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestionBody"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteQuestion
      tags: [surveys]
      summary: Delete a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        points:
          type: integer
        isActivated:
          type: boolean
        isVip:
          type: boolean
        referralCode:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - phone
        - points
        - isActivated
        - isVip
        - referralCode
        - createdAt

    SignupBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        phone:
          type: string
        referralCode:
          type: string
      required:
        - name
        - email
        - password
        - phone

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        userId:
          type: integer
        name:
          type: string
        phone:
          type: string
        points:
          type: integer
        isActivated:
          type: boolean
        isVip:
          type: boolean
        welcomeSurveyId:
          type: ["integer", "null"]
        referralCode:
          type: ["string", "null"]
      required:
        - userId
        - name
        - phone
        - points
        - isActivated
        - isVip
        - welcomeSurveyId
        - referralCode

    VipUpgradeBody:
      type: object
      properties:
        mpesaCode:
          type: string
      required:
        - mpesaCode

    VipUpgradeResponse:
      type: object
      properties:
        isVip:
          type: boolean
        points:
          type: integer
        message:
          type: string
      required:
        - isVip
        - points
        - message

    ActivateBody:
      type: object
      properties:
        mpesaCode:
          type: string
      required:
        - mpesaCode

    ActivateResponse:
      type: object
      properties:
        isActivated:
          type: boolean
        points:
          type: integer
        message:
          type: string
      required:
        - isActivated
        - points
        - message

    WithdrawalResponse:
      type: object
      properties:
        message:
          type: string
        points:
          type: integer
      required:
        - message
        - points

    CompleteSurveyBody:
      type: object
      properties:
        userId:
          type: integer
      required:
        - userId

    CompleteSurveyResponse:
      type: object
      properties:
        points:
          type: integer
        pointsEarned:
          type: integer
        message:
          type: string
      required:
        - points
        - pointsEarned
        - message

    Survey:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        reward:
          type: integer
        externalUrl:
          type: ["string", "null"]
        isPublished:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
        questionCount:
          type: integer
        responseCount:
          type: integer
      required:
        - id
        - title
        - description
        - reward
        - externalUrl
        - isPublished
        - createdAt
        - updatedAt
        - questionCount
        - responseCount

    CreateSurveyBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        reward:
          type: integer
        externalUrl:
          type: ["string", "null"]
        isPublished:
          type: boolean
      required:
        - title

    UpdateSurveyBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        reward:
          type: integer
        externalUrl:
          type: ["string", "null"]
        isPublished:
          type: boolean

    Question:
      type: object
      properties:
        id:
          type: integer
        surveyId:
          type: integer
        text:
          type: string
        type:
          type: string
          enum: [text, single_choice, multiple_choice, rating]
        options:
          type: ["string", "null"]
        orderIndex:
          type: integer
        required:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - surveyId
        - text
        - type
        - options
        - orderIndex
        - required
        - createdAt

    CreateQuestionBody:
      type: object
      properties:
        surveyId:
          type: integer
        text:
          type: string
        type:
          type: string
          enum: [text, single_choice, multiple_choice, rating]
        options:
          type: ["string", "null"]
        orderIndex:
          type: integer
        required:
          type: boolean
      required:
        - surveyId
        - text
        - type

    UpdateQuestionBody:
      type: object
      properties:
        text:
          type: string
        type:
          type: string
          enum: [text, single_choice, multiple_choice, rating]
        options:
          type: ["string", "null"]
        orderIndex:
          type: integer
        required:
          type: boolean

    SurveyResponse:
      type: object
      properties:
        id:
          type: integer
        surveyId:
          type: integer
        respondentName:
          type: ["string", "null"]
        answers:
          type: string
        submittedAt:
          type: string
      required:
        - id
        - surveyId
        - respondentName
        - answers
        - submittedAt

    SubmitResponseBody:
      type: object
      properties:
        respondentName:
          type: ["string", "null"]
        answers:
          type: object
          additionalProperties:
            type: string
      required:
        - answers

    QuestionSummary:
      type: object
      properties:
        questionId:
          type: integer
        questionText:
          type: string
        questionType:
          type: string
        answerBreakdown:
          type: object
          additionalProperties:
            type: integer
        totalAnswers:
          type: integer
      required:
        - questionId
        - questionText
        - questionType
        - answerBreakdown
        - totalAnswers

    SurveySummary:
      type: object
      properties:
        surveyId:
          type: integer
        totalResponses:
          type: integer
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionSummary"
      required:
        - surveyId
        - totalResponses
        - questions
