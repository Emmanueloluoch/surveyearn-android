kind = "mobile"
previewPath = "/surveypesa-mobile/"
title = "SurveyPesa KE Mobile"
version = "1.0.0"
id = "artifacts/surveypesa-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/surveypesa-mobile/" ]
localPort = 21603

[services.development]
run = "pnpm --filter @workspace/surveypesa-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/surveypesa-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/surveypesa-mobile", "run", "serve" ]

[services.env]
PORT = "21603"
BASE_PATH = "/surveypesa-mobile/"
