name: Generate Keystore (Run Once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias surveyearn \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore surveyearn.jks \
            -dname "CN=SurveyEarn, OU=Mobile, O=SurveyEarn, L=Nairobi, ST=Nairobi, C=KE" \
            -storepass surveyearn2024 \
            -keypass surveyearn2024 \
            -noprompt

      - name: Show base64-encoded keystore
        run: |
          echo "=== Copy this as your KEYSTORE_BASE64 secret ==="
          base64 surveyearn.jks
          echo ""
          echo "=== GitHub Secrets to add ==="
          echo "KEYSTORE_BASE64: (the base64 output above)"
          echo "KEYSTORE_PASSWORD: surveyearn2024"
          echo "KEY_ALIAS: surveyearn"
          echo "KEY_PASSWORD: surveyearn2024"
